name: Draft PDF

on:
  push:
    # limit runs to changes in the paper files to avoid unnecessary builds
    paths:
      - docs/**
      - docs/paper.md
      - docs/paper.bib
      - assets/**
      - .github/workflows/draft-pdf.yml

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          # This should be the path to the paper within your repo.
          paper-path: docs/paper.md

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          # This is the output path where Pandoc will write the compiled PDF.
          # Note: this should be the same directory as the input paper.md
          path: docs/paper.pdf

      # Optional: commit the generated PDF back to the repository.
      # If you enable this, make sure repository write access for Actions is enabled
      # in Settings → Actions → General → Workflow permissions.
      # - name: Commit PDF to repository
      #   uses: EndBug/add-and-commit@v9
      #   with:
      #     message: '(auto) Paper PDF Draft'
      #     add: 'paper.pdf'
